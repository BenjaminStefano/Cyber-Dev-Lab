<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Utilizamos esta etiqueta para importar Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"> <!-- Importamos fuentes bonitas -->
    <link rel="stylesheet" href="styles.css"> <!-- Enlazamos CSS -->
    <link rel="icon" type="image/png" href="assets/imgs/logoEmpresa.png"> <!-- Favicon cargado en la Carpeta del Proyecto -->
</head>

<body>

    <!-- Navbar principal  -->
    <nav class="navbar navbar-expand-lg navbar-premium">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/imgs/logoEmpresa.png" alt="Logo ConstruLab" class="logo-navbar">
                <span>ConstruLab</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContenido">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        Menú
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="gestionPersonal.html">
                        Gestionar Personal
                    </a>
                </li>
            </ul>

        </div>
        </div>
    </nav>
 
    <!-- Hero Principal con informacion hipotetica de la Empresa y derivacion a "Gestionar Personal" -->
    <section class="hero"> 
        <div class="container">
            <h1>Gestión Empresarial ConstruLab</h1>
                <p>
                    Plataforma integral para la administración
                    de personal y recursos de la empresa.
                </p>
            <a href="#registrarEmpleados" class="btn-premium">
                Gestionar Personal
            </a>
        </div>
    </section>
 

    <!-- Seccion donde aparece la Lista de Empleados, en caso de estar vacia, no se mostrara nada -->
    <section class="container mt-5">
        <h2>Listado de Empleados</h2>
        <div id="listaUsuarios" class="row"></div>
    </section>
    

    <!-- Seccion donde podremos registrar un nuevo empleado, donde despues de apretar el boton de confirmacion, se agregara a la Lista -->
    <section id="registrarEmpleados" class="container mt-5 mb-5">
    <h2>Registrar Empleado</h2>


    <!-- Creamos un nuevo Formulario con sus respectivos campos, tipos y clases -->
    <form id="formulario">
    <div class="row">
    
        <div class="col-md-6 mb-3">
        <label>Nombre</label>
        <input type="text" id="nombre" class="form-control">
        </div>
    
        <div class="col-md-6 mb-3">
        <label>Apellido</label>
        <input type="text" id="apellido" class="form-control">
        </div>
    
        <div class="col-md-6 mb-3">
        <label>Fecha Nacimiento</label>
        <input type="date" id="fechaNacimiento" class="form-control">
        </div>
    
        <div class="col-md-6 mb-3">
        <label>Correo</label>
        <input type="email" id="correo" class="form-control">
        </div>
    
        <div class="col-md-6 mb-3">
        <label>Cargo</label>
        <input type="text" id="cargo" class="form-control">
        </div>
    
        <div class="col-md-6 mb-3">
        <label>Fecha Ingreso</label>
        <input type="date" id="fechaIngreso" class="form-control">
        </div>
    
    </div>
        
        <!-- Por ultimo, agregamos un boton de confirmación para agregar al nuevo Empleado a la Lista -->
        <div class="text-center">
            <button type="submit" class="btn-premium">
                Agregar Empleado
            </button>
        </div>
 
    </form>
</section>


<!-- Footer -->
<footer>
    <p>
        © 2026 ConstruLab.
        Todos los derechos reservados.
    </p>
</footer>

<script src="script.js"></script>
</body>
</html>
